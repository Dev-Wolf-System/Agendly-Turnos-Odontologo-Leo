services:
  avax-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avax-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=supabase-db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}
      - FRONTEND_URL=https://${DOMAIN_NAME}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
      - BACKEND_URL=https://api.${DOMAIN_NAME}/api
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_evoapi
      - traefik.http.routers.avax-api.rule=Host(`api.${DOMAIN_NAME}`)
      - traefik.http.routers.avax-api.tls=true
      - traefik.http.routers.avax-api.entrypoints=web,websecure
      - traefik.http.routers.avax-api.tls.certresolver=mytlschallenge
      - traefik.http.services.avax-api.loadbalancer.server.port=3001
      - traefik.http.middlewares.avax-api-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.avax-api-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.avax-api-headers.headers.contentTypeNosniff=true
      # SSLRedirect eliminado — TLS ya está en el router; SSLRedirect causaba 403 en edge cases
      # CORS manejado por NestJS (origin: true)
      - traefik.http.routers.avax-api.middlewares=avax-api-headers@docker
    networks:
      - n8n_evoapi
      - supabase_network

  avax-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.${DOMAIN_NAME}/api
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: avax-frontend
    restart: always
    environment:
      - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.http.services.avax-web.loadbalancer.server.port=3000
      # Router principal — solo dominio sin www
      - traefik.http.routers.avax-web.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.routers.avax-web.tls=true
      - traefik.http.routers.avax-web.entrypoints=web,websecure
      - traefik.http.routers.avax-web.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.avax-web-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.avax-web-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.avax-web-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.avax-web-headers.headers.contentTypeNosniff=true
      - traefik.http.routers.avax-web.middlewares=avax-web-headers@docker
      # Redirect www → sin www (301 permanente)
      - traefik.http.routers.avax-www.rule=Host(`www.${DOMAIN_NAME}`)
      - traefik.http.routers.avax-www.tls=true
      - traefik.http.routers.avax-www.entrypoints=web,websecure
      - traefik.http.routers.avax-www.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.avax-www-redirect.redirectregex.regex=^https?://www\.(.*)
      - traefik.http.middlewares.avax-www-redirect.redirectregex.replacement=https://$${1}
      - traefik.http.middlewares.avax-www-redirect.redirectregex.permanent=true
      - traefik.http.routers.avax-www.middlewares=avax-www-redirect@docker
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:
    external: true
  supabase_network:
    external: true
