services:
  avax-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avax-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}
      - FRONTEND_URL=https://avax.${DOMAIN_NAME}
      - AGENT_API_KEY=${AGENT_API_KEY}
    labels:
      - traefik.enable=true
      - traefik.http.routers.avax-api.rule=Host(`api-avax.${DOMAIN_NAME}`)
      - traefik.http.routers.avax-api.tls=true
      - traefik.http.routers.avax-api.entrypoints=web,websecure
      - traefik.http.routers.avax-api.tls.certresolver=mytlschallenge
      - traefik.http.services.avax-api.loadbalancer.server.port=3001
      - traefik.http.middlewares.avax-api-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.avax-api-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.avax-api-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.avax-api-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.avax-api-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
      - traefik.http.middlewares.avax-api-cors.headers.accesscontrolallowheaders=Content-Type,Authorization
      - traefik.http.middlewares.avax-api-cors.headers.accesscontrolalloworiginlist=https://avax.${DOMAIN_NAME}
      - traefik.http.middlewares.avax-api-cors.headers.accesscontrolmaxage=100
      - traefik.http.routers.avax-api.middlewares=avax-api-headers@docker,avax-api-cors@docker
    networks:
      - n8n_evoapi

  avax-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api-avax.${DOMAIN_NAME}/api
    container_name: avax-frontend
    restart: always
    environment:
      - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.http.routers.avax-web.rule=Host(`avax.${DOMAIN_NAME}`)
      - traefik.http.routers.avax-web.tls=true
      - traefik.http.routers.avax-web.entrypoints=web,websecure
      - traefik.http.routers.avax-web.tls.certresolver=mytlschallenge
      - traefik.http.services.avax-web.loadbalancer.server.port=3000
      - traefik.http.middlewares.avax-web-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.avax-web-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.avax-web-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.avax-web-headers.headers.contentTypeNosniff=true
      - traefik.http.routers.avax-web.middlewares=avax-web-headers@docker
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:
    external: true
